services:
  postgres:
    image: postgres:16
    container_name: stc-postgres
    environment:
      POSTGRES_DB: smart_tool_cabinets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - stc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_tool_cabinets"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stc_pgdata:

