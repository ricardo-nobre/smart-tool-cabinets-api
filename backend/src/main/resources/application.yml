spring:
  application:
    name: smart-tool-cabinets-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_tool_cabinets}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

